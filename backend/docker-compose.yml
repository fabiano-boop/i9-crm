version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: i9crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: i9crm
      POSTGRES_USER: i9user
      POSTGRES_PASSWORD: i9pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U i9user -d i9crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: i9crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: i9crm-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      CORS_ORIGIN: "*"
      CORS_METHODS: POST,GET,PUT,DELETE
      CORS_CREDENTIALS: true
      LOG_LEVEL: ERROR
      LOG_COLOR: true
      LOG_BAILEYS: error
      DEL_INSTANCE: false
      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://i9user:i9pass@postgres:5432/i9crm
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_MESSAGE_UPDATE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      DATABASE_SAVE_DATA_CHATS: true
      REDIS_ENABLED: true
      REDIS_URI: redis://redis:6379
      REDIS_PREFIX_KEY: evolution
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: B6D711FCDE4D4FD5936544120E713976
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances

volumes:
  postgres_data:
  redis_data:
  evolution_data:
